<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM - CompraTech</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./logo.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="./logo.png?v=2">
  <link rel="shortcut icon" type="image/png" href="./logo.png?v=2">
  <link rel="apple-touch-icon" href="./logo.png?v=2">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="login-gate" class="container auth-wrapper">
    <section class="card auth-card">
      <a class="back-link" href="index.html">Voltar para vitrine</a>
      <h1>Acesso Admin</h1>
      <p class="subtitle">Entre para gerenciar produtos afiliados.</p>
      <form id="login-form" class="form">
        <label>
          Email admin
          <input id="login-user" type="email" required autocomplete="username">
        </label>
        <label>
          Senha
          <input id="login-pass" type="password" required autocomplete="current-password">
        </label>
        <button class="btn-primary" type="submit">Entrar</button>
      </form>
      <p id="login-status" class="status-message"></p>
    </section>
  </section>

  <div id="admin-app" hidden>
    <div class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <img src="logo.png" alt="CompraTech" class="brand__logo">
          <span>Painel CompraTech</span>
        </div>
        <div class="admin-actions">
          <a class="back-link" href="index.html">Vitrine</a>
          <button id="logout-btn" class="btn-secondary" type="button">Sair</button>
        </div>
      </div>
    </div>

    <main class="container admin-layout">
      <section class="card">
        <h2 id="form-title">Novo produto</h2>
        <p id="form-mode-hint" class="empty-state" hidden>Modo edicao ativo.</p>
        <form id="product-form" class="form">
          <label>
            Link de afiliacao
            <input id="affiliate-link" type="url" required placeholder="https://...">
          </label>
          <label>
            Titulo
            <input id="title" type="text" required>
          </label>
          <label>
            Categoria
            <input id="category" type="text" placeholder="Ex.: Eletronicos">
          </label>
          <label>
            Preco (R$)
            <input id="price" type="number" step="0.01" min="0">
          </label>
          <label>
            URL da imagem
            <input id="image" type="url">
          </label>
          <label>
            Descricao
            <textarea id="description" rows="3"></textarea>
          </label>
          <div class="admin-actions">
            <button id="save-btn" class="btn-primary" type="submit">Salvar produto</button>
            <button id="cancel-edit-btn" class="btn-secondary" type="button" hidden>Cancelar edicao</button>
          </div>
        </form>
        <p id="status-message" class="status-message"></p>
      </section>

      <section class="card">
        <h2>Produtos cadastrados</h2>
        <div id="admin-products-list" class="admin-products-list"></div>
        <p id="admin-empty-state" class="empty-state">Voce ainda nao cadastrou produtos.</p>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="storage.js"></script>
  <script src="admin.js"></script>
</body>
</html>
